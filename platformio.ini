; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
name = "GuL_Plantower"
description="Library for the arduino framework for handling the particle sensor devices of plantower"

[env]
lib_deps = https://github.com/boeserfrosch/GuL_HAL.git	

[env:normal]
platform = espressif32
board = esp-wrover-kit
framework = arduino
test_ignore = *

[env:native]
platform = native
test_framework = unity
build_flags = -I test/arduino_shim
test_build_src = yes
test_ignore = *hardware*

[env:esp32_arduino]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
test_build_src = yes
test_framework = unity
build_flags = 
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1

